<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dinant NFC</title>
  <link href="./NuevoLogo.png" rel="icon">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #c3c3c3;
      color: white;
      min-height: 100vh;
    }

    .card-custom {
      background: #ffffff;
      border: none;
      border-radius: 20px;
    }

    .resultado {
      background: #e2e2e2;
      color: #22c55e;
      min-height: 180px;
      border-radius: 12px;
      padding: 15px;
      overflow: auto;
      white-space: pre-wrap;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <!--0f172a
1e293b
-->
  <div class="container py-5">

    <div class="row justify-content-center">

      <div class="col-lg-7">

        <div class="card card-custom shadow-lg">

          <div class="card-body p-4">

            <h1 class="text-center mb-4">
              Etiquetas NFC
            </h1>

            <!-- INPUT -->
            <div class="row mb-3">
              <div class="col-lg-4">
                <label class="form-label">
                  Codigo Unidad
                </label>

                <input type="text" id="codigoUnidad" class="form-control form-control-lg" disabled>
              </div>
             
              <div class="col-lg-4">
                <label class="form-label">
                  Placa Camion
                </label>
                <input type="text" id="placaCamion" class="form-control form-control-lg" disabled>
              </div>

              <div class="col-lg-4">
                <label class="form-label">
                  Placa Furgon
                </label>
                <input type="text" id="placaFurgon" class="form-control form-control-lg" disabled>
              </div>

            </div>

            <!-- BOTONES -->
            <div class="d-grid gap-3">
              <!-- BOTONES 
            <button
              class="btn btn-success btn-lg"
              onclick="leerNFC()">
              Leer NFC
            </button>

            <button
              class="btn btn-primary btn-lg"
              onclick="escribirNFC()">
              Escribir NFC
            </button>

            <button
              class="btn btn-danger btn-lg"
              onclick="borrarNFC()">
              Borrar NFC
            </button>
    -->
              <button class="btn btn-warning btn-lg" onclick="modificarNFC()">
                Modificar NFC
              </button>



            </div>

            <!-- RESULTADO -->
            <div class="mt-4">

              <h4>Resultado</h4>

              <div id="resultado" class="resultado">

                Esperando acción NFC...

              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <script>
    // Obtenemos los parámetros de la URL
    const urlParams = new URLSearchParams(window.location.search);

    // Obtenemos el valor del parámetro "system"
    var codigoUnidad = urlParams.get('codigoUnidad');
    var placaCamion = urlParams.get('placaCamion');
    var placaFurgon = urlParams.get('placaFurgon');
    var urlObjeto = urlParams.get('objeto');

    let codigoUnidadDes = atob(codigoUnidad);
    let placaCamionDes = atob(placaCamion);
    let placaFurgonDes = atob(placaFurgon);
    
    document.getElementById("codigoUnidad").value = codigoUnidadDes;
    document.getElementById("placaCamion").value = placaCamionDes;
    document.getElementById("placaFurgon").value = placaFurgonDes;


    const resultado =
      document.getElementById("resultado");


    // VALIDAR SOPORTE NFC
    function verificarNFC() {

      if (!("NDEFReader" in window)) {

        resultado.innerHTML =
          "❌ Este dispositivo no soporta Web NFC";

        return false;
      }

      return true;
    }


    // LEER NFC
    async function leerNFC() {

      if (!verificarNFC()) return;

      try {

        const ndef = new NDEFReader();

        resultado.innerHTML =
          "📲 Acerca una tarjeta NFC...";

        await ndef.scan();

        ndef.onreading = event => {

          const decoder = new TextDecoder();

          let contenido = "";

          for (const record of event.message.records) {

            contenido += decoder.decode(record.data);
          }

          resultado.innerHTML =
            "✅ NFC LEÍDA\n\n" + contenido;
        };

      } catch (error) {

        resultado.innerHTML =
          "❌ Error al leer NFC\n\n" + error;
      }
    }


    // ESCRIBIR NFC
    async function escribirNFC() {

      if (!verificarNFC()) return;

      try {

        const texto =
          document.getElementById("codigoUnidad").value;

        if (texto.trim() === "") {

          resultado.innerHTML =
            "⚠️ Debes escribir un texto";

          return;
        }

        const ndef = new NDEFReader();

        resultado.innerHTML =
          "📲 Acerca la NFC para escribir...";

        await ndef.write(texto);

        resultado.innerHTML =
          "✅ NFC escrita correctamente\n\n" + texto;

      } catch (error) {

        resultado.innerHTML =
          "❌ Error al escribir\n\n" + error;
      }
    }


    // MODIFICAR NFC
    async function modificarNFC() {

      if (!verificarNFC()) return;

      try {
        
        //const texto = document.getElementById("codigoUnidad").value;
        const texto = `{"CodigoUnidad":"${codigoUnidadDes}","PlacaCamion":"${placaCamionDes}","PlacaFurgon":"${placaFurgonDes}"}`;

        if (texto.trim() === "") {

          resultado.innerHTML =
            "⚠️ Debes escribir un nuevo texto";

          return;
        }

        const ndef = new NDEFReader();

        resultado.innerHTML =
          "📲 Acerca la NFC para modificar...";

        await ndef.write(texto);

        resultado.innerHTML =
          "✅ NFC modificada\n\nNuevo contenido:\n" + texto;

      } catch (error) {

        resultado.innerHTML =
          "❌ Error al modificar\n\n" + error;
      }
    }


    // BORRAR NFC
    async function borrarNFC() {

      if (!verificarNFC()) return;

      try {

        const ndef = new NDEFReader();

        resultado.innerHTML =
          "📲 Acerca la NFC para borrar...";

        await ndef.write("");

        resultado.innerHTML =
          "🗑️ NFC borrada correctamente";

      } catch (error) {

        resultado.innerHTML =
          "❌ Error al borrar\n\n" + error;
      }
    }

  </script>

</body>

</html>
